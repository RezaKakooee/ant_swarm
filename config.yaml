# =====================================================================
# Ant-Swarm T-Barrier — single source of truth for ALL parameters.
#
# Consumed by:
#   * the Python gym env  (via swarm_config.load_config)
#   * the interactive HTML (via web_config.js, generated by gen_web_config.py)
#
# After editing this file, run:  python gen_web_config.py
# to refresh the HTML's copy of the geometry.
# =====================================================================

scene_scale: 1.0          # global uniform scale (kept 1.0; hook for MuJoCo parity)

world:
  width: 1.25
  height: 0.72

walls:                    # the two inner barrier columns
  x_columns: [0.525, 0.735] # spacing 0.210 (sandbox-tuned)
  length: 0.285           # gap 0.150; length of each wall segment (gap = height - 2*length)
  thickness: 0.02
  render_extra: 0.20      # cosmetic outward extension when rendering
  height: 0.08            # (3-D only) unused by the 2-D sim

tshape:                   # the movable T-shaped object
  stem_len: 0.265         # longer stem = harder to thread (sandbox-tuned)
  cap_big_len: 0.18
  cap_small_len: 0.09
  thickness: 0.02
  z: 0.02                 # (3-D only)
  height: 0.04            # (3-D only)

goal:
  pos: [1.05, 0.36]
  reach_radius: 0.05

spawn:                    # where the T is placed at episode start (left of barrier)
  x_range: [0.06, 0.40]
  angle_range: [-1.5707963, 1.5707963]   # ±pi/2
  margin: 0.06
  max_tries: 500

ants:
  n: 1                    # 1 = single agent (centre of stem), >=2 = multi-agent (cap junctions)
  single_agent_spin: true # n==1 only: add a spin/torque action so it can rotate (else translate-only)
  radius: 0.005
  z: 0.04                 # (3-D only)
  mass: 0.001             # (unused by current point-force model)

motion:
  mode: dynamic         # kinematic = direct move (simple) | dynamic = forces+momentum
  # --- kinematic params (mode: kinematic) ---
  step_len: 0.01          # world units translated per step at full magnitude
  rot_step: 0.10          # radians rotated per step at |rotation|=1

physics:                  # only used when motion.mode == dynamic
  push_strength: 0.0005   # per-ant max force magnitude (2x: faster translation)
  object_mass: 0.5
  object_inertia: 0.01    # 4x lower -> ~4x faster rotation
  linear_friction: 0.96
  angular_friction: 0.94
  substeps: 10
  spin_strength: null     # single-agent torque per |spin|=1; null -> push_strength*stem/2
  boundary_margin: 0.025  # keep-out margin from world edge
  restitution_wall: -0.2  # velocity scaling on wall hit
  restitution_bound: -0.15

env:
  max_steps: 500              # ~2-3x a good trajectory; shorter = more episodes, tighter credit
  reward_mode: sparse         # sparse = only success bonus | shaped = + distance shaping
  reward_progress_coef: 0.1   # dense shaping weight (used only when reward_mode: shaped)
  reward_success: 1.0         # sparse bonus on reaching goal
  goal_track: big_cap         # T point that must reach the goal: big_cap | center | small_cap
                              # big_cap motivates leading with the HARD end (no small-cap cheat)

# Curriculum (read by train scripts). Advances when rolling success >= threshold;
# eval is always held at the real hard task. mode: gap | reverse
curriculum:
  enabled: true
  mode: reverse               # gap = widen->narrow barrier | reverse = move spawn goal->full
  success_threshold: 0.7      # advance when rolling success rate >= this
  window: 100                 # episodes in the success-rate window
  max_steps_per_stage: 2000000  # stall safety: force-advance if a stage drags this long (null = off)
  # early stopping: stop once the HARD target is mastered for a sustained window
  stop_on_master: true
  stop_success: 0.9             # stop when success >= this ...
  stop_window: 200              # ... over this many consecutive episodes at the target

  # --- gap mode: anneal barrier wall length (wider -> narrower gap) ---
  start_wall_len: 0.245       # easy: wide gap (~0.23, straight-push possible)
  target_wall_len: 0.285      # hard: narrow gap (0.15, threading required)
  step: 0.01                  # wall-length increment per advance

  # --- reverse mode: pin gap, move spawn from past-the-barrier back to full ---
  reverse_wall_len: 0.285     # gap pinned here (the hard target) throughout
  start_spawn_x: 0.90         # easy: T starts PAST the barrier, near the goal
  target_spawn_x: 0.23        # hard: full left spawn (the real task)
  spawn_step: 0.07            # move the start back by this per advance
  spawn_band: 0.05            # +/- x band the start is sampled within

# Run settings shared by both train scripts (no argparse — everything is here).
run:
  wandb: true               # log to Weights & Biases (sync_tensorboard mirrors TB)
  render_freq: 500000       # save a policy GIF every N env steps
  init_from: null # storage_local/ant__20260601_1714__13102512__train_sac__single/checkpoints/best/best_model.zip         # warm-start policy weights from this checkpoint .zip (null = scratch)
  eval: false               # true = evaluate `eval_model` instead of training
  eval_model: null          # checkpoint .zip to evaluate when eval: true
  eval_episodes: 20
  # successful-trajectory saving (kept in <run>/successes/*.json)
  save_successes: true      # save successful episodes for reuse (BC/demos/warm-start)
  dedup_successes: true     # skip near-identical paths (fixed spawn -> many copies)
  dedup_tol: 0.05           # max object-path diff below which two trajectories are "the same"

# PPO hyperparameters + exploration knobs (read by train_ppo.py).
ppo:
  # run
  timesteps: 50000000
  n_envs: 8
  # core
  n_steps: 4096
  batch_size: 512
  n_epochs: 100
  gamma: 0.99               # effective horizon ~100; matches the shorter episodes
  gae_lambda: 0.95
  clip_range: 0.2
  learning_rate: 0.0003
  # --- exploration ---
  ent_coef: 0.05            # entropy bonus (primary exploration knob)
  ent_coef_final: 0.005      # set a float to linearly anneal ent_coef -> this over training
  use_sde: true            # gSDE: temporally-correlated (coherent) exploration
  sde_sample_freq: 16       # resample gSDE noise every N steps (only if use_sde)
  log_std_init: 0.5         # initial action-distribution log-std; raise (~0.5) to widen

# SAC hyperparameters (read by train_sac.py).
sac:
  # run
  timesteps: 15000000
  # core
  buffer_size: 1000000
  batch_size: 256
  learning_starts: 10000
  gamma: 0.99
  tau: 0.005
  learning_rate: 0.0003
  ent_coef: auto            # SAC auto entropy tuning
