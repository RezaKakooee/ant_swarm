# =====================================================================
# Ant-Swarm T-Barrier — single source of truth for ALL parameters.
#
# Consumed by:
#   * the Python gym env  (via swarm_config.load_config)
#   * the interactive HTML (via web_config.js, generated by gen_web_config.py)
#
# After editing this file, run:  python gen_web_config.py
# to refresh the HTML's copy of the geometry.
# =====================================================================

scene_scale: 1.0          # global uniform scale (kept 1.0; hook for MuJoCo parity)

world:
  width: 1.25
  height: 0.72

walls:                    # the two inner barrier columns
  x_columns: [0.52, 0.74] # x position of each vertical wall column
  length: 0.285           # length of each wall segment (gap = height - 2*length)
  thickness: 0.02
  render_extra: 0.20      # cosmetic outward extension when rendering
  height: 0.08            # (3-D only) unused by the 2-D sim

tshape:                   # the movable T-shaped object
  stem_len: 0.22
  cap_big_len: 0.18
  cap_small_len: 0.09
  thickness: 0.02
  z: 0.02                 # (3-D only)
  height: 0.04            # (3-D only)

goal:
  pos: [1.05, 0.36]
  reach_radius: 0.05

spawn:                    # where the T is placed at episode start (left of barrier)
  x_range: [0.06, 0.40]
  angle_range: [-1.5707963, 1.5707963]   # ±pi/2
  margin: 0.06
  max_tries: 500

ants:
  n: 2
  radius: 0.005
  z: 0.04                 # (3-D only)
  mass: 0.001             # (unused by current point-force model)

physics:
  push_strength: 0.00025  # per-ant max force magnitude
  object_mass: 0.5
  object_inertia: 0.04
  linear_friction: 0.96
  angular_friction: 0.94
  substeps: 10
  boundary_margin: 0.025  # keep-out margin from world edge
  restitution_wall: -0.2  # velocity scaling on wall hit
  restitution_bound: -0.15

env:
  max_steps: 2000
  reward_progress_coef: 0.1   # dense shaping weight
  reward_success: 1.0         # sparse bonus on reaching goal
